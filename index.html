<!DOCTYPE html>
<html>
    <head>
        <title>Crazy Game</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body class="smooth-text">
        <div class="timer" id="timer">01:30</div>
        <div class="word-tracker" id="wordTracker">Words: 0</div>
        <div class="container">
            <h1 class="smooth-text">Crazy Typing Game</h1>
            
            <div class="input-group">
                <label for="animatedInput" class="smooth-text">Welcome To the Crazy Game:</label>
                <input type="text" id="animatedInput" class="typewriter-input smooth-text" />
            </div>
            
            <div id="description" class="description smooth-text">
                <strong>How it works:</strong> Type and stuff will happen!!!
            </div>
        </div>
        <script src="Javascripts/Animation.js"></script>
        <script src="Javascripts/Timer.js"></script>
        <script src="Javascripts/Words.js"></script>
    </body>
</html>
